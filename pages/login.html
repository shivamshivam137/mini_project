<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Civitas | Login</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/auth.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>

<body>
    <div class="auth-layout">
        <!-- Aurora Background -->
        <div class="mesh-bg">
            <div class="blob blob-1"></div>
            <div class="blob blob-2"></div>
            <div class="blob blob-3"></div>
        </div>

        <div class="auth-container">
            <div class="auth-card reveal reveal-active glass-panel">
                <div class="auth-logo-wrapper">
                    <a href="../index.html" class="logo auth-logo-link">
                        <i data-lucide="shield-check"></i>
                        <span>Civitas</span>
                    </a>
                </div>

                <div class="auth-header">
                    <h1>Welcome Back</h1>
                    <p>Login to access your personalized feed.</p>
                </div>

                <!-- Google Auth Button -->
                <button type="button" class="btn-google" id="google-login-btn">
                    <svg viewBox="0 0 24 24">
                        <path fill="#4285F4"
                            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                        <path fill="#34A853"
                            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                        <path fill="#FBBC05"
                            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                        <path fill="#EA4335"
                            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                    </svg>
                    Continue with Google
                </button>

                <div class="auth-divider">or log in with email</div>

                <!-- Traditional Email Form -->
                <form id="login-form" class="pro-form" autocomplete="off">
                    <div class="form-group icon-input">
                        <i data-lucide="mail"></i>
                        <input type="email" id="email" required placeholder="Email Address" autocomplete="chrome-off">
                    </div>
                    <div class="form-group icon-input">
                        <i data-lucide="lock"></i>
                        <input type="password" id="password" required placeholder="Password"
                            autocomplete="new-password">
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Login</button>
                </form>

                <div class="auth-footer-links">
                    <p>
                        Don't have an account? <a href="signup.html" class="highlight-link">Sign Up</a>
                    </p>
                    <p class="forgot-pwd">
                        <a href="#" onclick="alert('Feature coming soon!')">Forgot Password?</a>
                    </p>
                </div>

                <div id="auth-error" class="auth-alert error"></div>
                <div id="auth-success" class="auth-alert success"></div>
            </div>
        </div>
    </div>

    <script src="../js/main.js"></script>
    <script src="../js/firebase-config.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (window.lucide) lucide.createIcons();
        });
    </script>
</body>

</html>
